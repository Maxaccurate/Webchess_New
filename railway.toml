[build]
builder = "nixpacks"
buildCommand = "cd server && npm install"
watchPatterns = ["server/**"]

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 10
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[[services]]
name = "webchess-server"
port = 3000
rootDir = "server"
startCommand = "npm start"